services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: mealbudget
      POSTGRES_USER: mealbudget
      POSTGRES_PASSWORD: mealbudget
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealbudget -d mealbudget"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
