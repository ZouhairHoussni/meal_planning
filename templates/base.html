{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MealBudget{% endblock %}</title>
    <script>
      tailwind = {
        theme: {
          extend: {
            colors: {
              canvas: "#F5F8FF",
              surface: "#FFFFFF",
              "surface-muted": "#EAF2FF",
              text: "#10213F",
              "text-muted": "#60708A",
              primary: "#2563EB",
              "primary-hover": "#1D4ED8",
              "primary-soft": "#DBEAFE",
              accent: "#F7C948",
              success: "#16A34A",
              warning: "#F59E0B",
              danger: "#E0523F",
              border: "#D8E2F3",
              navy: "#102A56",
              cream: "#FFF8E7",
            },
            boxShadow: {
              soft: "0 22px 55px rgba(37, 99, 235, 0.12)",
              lift: "0 12px 28px rgba(16, 33, 63, 0.10)",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/app.css' %}">
    {% block extra_head %}{% endblock %}
  </head>
  <body class="min-h-screen bg-canvas text-text antialiased">
    {% block body %}{% endblock %}
    <script src="{% static 'js/app.js' %}" defer></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
