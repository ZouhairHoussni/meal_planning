{% extends "base.html" %}

{% block body %}
  <main class="grid min-h-screen bg-canvas lg:grid-cols-[1fr_520px]">
    <section class="hidden items-center px-12 lg:flex">
      <div class="max-w-xl">
        <p class="text-sm font-semibold uppercase tracking-[0.2em] text-primary">MealBudget</p>
        <h1 class="mt-5 text-4xl font-semibold leading-tight text-text">Plan meals. Shop with purpose. Stay on budget.</h1>
        <p class="mt-5 text-lg leading-8 text-text-muted">A calm weekly workspace for meals, pantry checks and grocery spending.</p>
      </div>
    </section>
    <section class="flex min-h-screen items-center justify-center px-4 py-10">
      <div class="w-full max-w-md">
        <a href="{% url 'dashboard' %}" class="mb-8 flex items-center justify-center gap-3 text-lg font-semibold text-text">
          <span class="grid h-11 w-11 place-items-center rounded-2xl bg-primary text-sm font-bold text-white">MB</span>
          <span>MealBudget</span>
        </a>
        {% block auth_content %}{% endblock %}
      </div>
    </section>
  </main>
{% endblock %}
